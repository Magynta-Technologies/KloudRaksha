services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - kloudraksha-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    volumes:
      - ./server/prowler_outputs:/app/prowler-reports:ro
    depends_on:
      mongo:
        condition: service_healthy
      audit:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 8000
      HOST: 0.0.0.0
      MONGODB_URL: mongodb://mongo:27017/kloudraksha
      JWT_SECRET: ${JWT_SECRET:-default-jwt-secret}
      COOKIE_SECRET: ${COOKIE_SECRET:-default-cookie-secret}
      API_URL: http://backend:8000/api
      INTERNAL_API_URL: http://backend:8000/api
      AUDIT_SERVICE_URL: http://audit:6000
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4173}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-prowler-reports}
      REQUIRE_S3_UPLOAD: ${REQUIRE_S3_UPLOAD:-false}
      LOCAL_REPORTS_DIR: /app/prowler-reports
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - kloudraksha-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${PUBLIC_API_URL:-/api}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    networks:
      - kloudraksha-network
    restart: unless-stopped

  audit:
    build: ./server
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URL: mongodb://mongo:27017/kloudraksha
      MONGODB_DB: kloudraksha
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-prowler-reports}
      SES_SENDER_EMAIL: ${SES_SENDER_EMAIL}
      PROWLER_IMAGE: toniblyx/prowler:latest
      AUDIT_CONTAINER_BASE: /tmp/audit
      LOCAL_REPORTS_DIR: /app/prowler-reports
      PROWLER_FORMATS: json-ocsf,json-asff,html
      RAW_REPORT_RETENTION_DAYS: ${RAW_REPORT_RETENTION_DAYS:-30}
      S3_UPLOAD_ATTEMPTS: ${S3_UPLOAD_ATTEMPTS:-3}
      S3_UPLOAD_BACKOFF: ${S3_UPLOAD_BACKOFF:-2}
    volumes:
      # Docker-in-Docker (required for spawning prowler containers)
      - /var/run/docker.sock:/var/run/docker.sock

      # ✅ SHARED WORK DIRECTORY (FIX)
      - ./server/audit_temp:/app/audit_temp
      
      # Local reports storage (host-accessible)
      - ./server/prowler_outputs:/app/prowler-reports
    ports:
      - "${AUDIT_PORT:-6000}:6000"
    networks:
      - kloudraksha-network
    restart: unless-stopped
    privileged: true

volumes:
  mongo-data:
    driver: local

networks:
  kloudraksha-network:
    driver: bridge
